[item-description]
nullius-geology-pack=Die Mineralprobe wird im Labor untersucht, um die Technologie an die vor Ort vorkommenden Mineralien anzupassen.
nullius-climatology-pack=Die Klimaprobe wird im Labor untersucht, um die Technologie an das lokale Klima anzupassen.
nullius-mechanical-pack=Ein mechanischer Prototyp wird im Labor untersucht, um die Fertigung mechanischer Geräte zu optimieren.
nullius-electrical-pack=Ein elektrischer Prototyp wird im Labor untersucht, um die Produktion elektronischer Geräte zu optimieren.
nullius-chemical-pack=Die chemische Probe wird im Labor untersucht, um die Synthese chemischer Substanzen zu kalibrieren.
nullius-physics-pack=Geräte, die in einem Labor zur Durchführung physikalischer Experimente verwendet werden.
nullius-astronomy-pack=Ein interstellares Signal wird im Labor entschlüsselt, um Zugang zu fortgeschrittenem Wissen der Vorfahren zu erhalten.
nullius-biochemistry-pack=Eine chemische Probe, die im Biologielabor untersucht wird, um die biochemische Synthese zu kalibrieren.
nullius-microbiology-pack=Im Biologielabor wird die mikrobielle Probe untersucht, um die Mikroflora an den Planeten anzupassen.
nullius-botany-pack=Im Biologielabor wird die Pflanzenprobe untersucht, um Pflanzen an das lokale Klima anzupassen.
nullius-dendrology-pack=Im Biologielabor wird Baumgewebe untersucht, um Bäume an die Umwelt anzupassen.
nullius-nematology-pack=Im Biologielabor wird die Wurmprobe untersucht, um die Würmer an den örtlichen Boden anzupassen.
nullius-ichthyology-pack=Fischprobe, die im Biologielabor untersucht wird, um die Fische an die örtlichen Gewässer anzupassen.
nullius-zoology-pack=Im Biologielabor wird das Gliederfüßer-Exemplar untersucht, um die Anpassung der Gliederfüßer an ihre Umgebung zu untersuchen.
nullius-self-repair-pack=Aktiviere diese Funktion, um Schäden an deinem physischen Avatar zu reparieren.
