nullius-barrel=Befördert Flüssigkeiten im Fass.
nullius-canister=Leere den Kraftstoffbehälter des Fahrzeugs.
nullius-water-canister=Leere wiederverwendbare Brennstoffkartusche.
nullius-haste-module-1=Erhöht die Produktionsgeschwindigkeit und den Energieverbrauch.
nullius-haste-module-2=Erhöht die Produktionsgeschwindigkeit und den Energieverbrauch.
nullius-haste-module-3=Erhöht die Produktionsgeschwindigkeit und den Energieverbrauch.
nullius-haste-module-4=Erhöht die Produktionsgeschwindigkeit und den Energieverbrauch.
nullius-speed-module-1=Steigert die Fertigungsgeschwindigkeit auf effiziente Weise.
nullius-speed-module-2=Steigert die Fertigungsgeschwindigkeit auf effiziente Weise.
nullius-speed-module-3=Steigert die Fertigungsgeschwindigkeit auf effiziente Weise.
nullius-speed-module-4=Steigert die Fertigungsgeschwindigkeit auf effiziente Weise.
nullius-efficiency-module-1=Senkt den Energieverbrauch (Minimum 20 %).
nullius-efficiency-module-2=Senkt den Energieverbrauch (Minimum 20 %).
nullius-efficiency-module-3=Senkt den Energieverbrauch (Minimum 20 %).
nullius-yield-module-1=Steigert die Produktionsleistung, allerdings auf Kosten anderer Faktoren.
nullius-yield-module-2=Steigert die Produktionsleistung, allerdings auf Kosten anderer Faktoren.
nullius-yield-module-3=Steigert die Produktionsleistung, allerdings auf Kosten anderer Faktoren.
nullius-yield-module-4=Steigert die Produktionsleistung, allerdings auf Kosten anderer Faktoren.
nullius-productivity-module-1=Steigert die Produktionsleistung auf effiziente Weise.
nullius-productivity-module-2=Steigert die Produktionsleistung auf effiziente Weise.
nullius-productivity-module-3=Steigert die Produktionsleistung auf effiziente Weise.
nullius-chassis-1=Wird im Rüstungsplatz getragen, um die Ausrüstungskapazität und die Verteidigung zu erhöhen.
nullius-chassis-2=Wird im Rüstungsplatz getragen, um die Ausrüstungskapazität und die Verteidigung zu erhöhen.
nullius-chassis-3=Wird im Rüstungsplatz getragen, um die Ausrüstungskapazität und die Verteidigung zu erhöhen.
nullius-chassis-4=Wird im Rüstungsplatz getragen, um die Ausrüstungskapazität und die Verteidigung zu erhöhen.
nullius-chassis-5=Wird im Rüstungsplatz getragen, um die Ausrüstungskapazität, die Inventargröße, die Verteidigung und das Charisma zu erhöhen.
nullius-gun=Ziele einzeln ausschalten.  Mit Magazinen bestückt.
nullius-car-gun=Ziele einzeln ausschalten.  Mit Magazinen bestückt.
nullius-rifle=In kurzen, dichten Salven abfeuern.  Mit Magazinen geladen.
nullius-missile-launcher=Zerstöre Gebiete aus der Ferne mit Raketen.
nullius-mecha-drone-launcher=Startet Drohnen an nahegelegenen Orten.
nullius-mecha-remote=Verbindet sich mit einem Mecha und steuert ihn aus der Ferne.
nullius-magazine=Einzelne Ziele zerstören.  Mit Pistole oder Gewehr beschießen.
nullius-magazine-2=Vernichtet alles. Mit einer Pistole oder einem Gewehr erschießen.
nullius-missile-1=Zerstört Objekte in einem mittleren Umkreis, einschließlich Klippen.
nullius-missile-2=Zerstört alles in einem weiten Umkreis und hinterlasst einen Kratersee.
nullius-explosive=Durch eine kontrollierte Sprengung werden die Felsen sicher abgetragen.
nullius-scout-drone-1=Kundschaftet einen 7×7-Sektor der Karte aus.
nullius-scout-drone-2=Kundschaftet einen 13×13-Sektor der Karte aus.
nullius-scout-remote=Wähle einen Ort auf der Karte aus, um eine Aufklärungsdrohne zu starten, die einen Teil der Karte sichtbar macht. In der Kartenansicht kannst du unerforschte, weit entfernte Orte innerhalb der Reichweite eines Drohnenwerfers auswählen.
nullius-demolition-drone=Zerstört alles außer Rohstoffvorkommen in einem Bereich von 4x4 Sektoren.
nullius-demolition-remote=Wählt einen Standort auf der Karte aus, um eine Abrissdrohne zu starten, die alles außer Rohstoffvorkommen in einem Bereich von 4x4 Sektoren zerstört.
nullius-shallow-excavation-drone=Ersetzt unbewohntes Land in einem 4x4-Sektor durch seichtes Wasser. Kann den Terraform-Wert des Planeten ebenso erhöhen wie Terraforming-Drohnen (0,5-fache Terraform-Wirksamkeit).
nullius-shallow-excavation-remote=Wählt einen Standort auf der Karte aus, um eine Aushubdrohne zu starten, wodurch unbewirtschaftetes Land in einem 4x4-Sektor durch seichtes Wasser ersetzt wird.
nullius-excavation-drone=Ersetzt Land in einem 4x4-Sektor durch Tiefwasser.  Alles, was sich an Land befindet, einschließlich Ressourcen, wird dabei entfernt.  Kann den Terraform-Wert des Planeten ebenso erhöhen wie Terraforming-Drohnes.
nullius-excavation-remote=Wählt einen Punkt auf der Karte aus, um eine Ausgrabungsdrohne zu starten, die in einem 4x4-Sektor Land durch tiefes Wasser ersetzt.
nullius-terraforming-drone-grey=Ersetzt die Landschaft in einem Bereich von etwa 4x4 Sektoren durch graues Gelände. Entfernt Felsen, Klippen, Wasser und Trümmer. Erhöht den Terraform-Wert des Planeten, wenn exotisches Gelände wie violettes, vulkanisches oder schwarzes Gelände ersetzt wird.
nullius-terraforming-remote-grey=Wähle einen Ort auf der Karte aus, um die graue Terraforming-Drohne zu starten und das Gelände zu verändern.
nullius-terraforming-drone-tan=Ersetzt die Landschaft in einem Bereich von etwa 4x4 Sektoren durch hellbraunes Gelände. Entfernt Felsen, Klippen, Wasser und Trümmer. Erhöht die Terraform-Bewertung des Planeten, wenn exotisches Gelände wie violettes, vulkanisches oder schwarzes Gelände ersetzt wird (1,25-fache Terraform-Effektivität).
nullius-terraforming-remote-tan=Wähle einen Ort auf der Karte aus, um eine Terraforming-Drohne zu starten, die das Gelände umgestaltet.
nullius-terraforming-drone-brown=Ersetzt die Landschaft in einem Bereich von etwa 4x4 Sektoren durch braunes Gelände. Entfernt Felsen, Klippen, Wasser und Trümmer. Erhöht die Terraform-Bewertung des Planeten, wenn exotisches Gelände wie violettes, vulkanisches oder schwarzes Gelände ersetzt wird (1,5-fache Terraform-Wirksamkeit).
nullius-terraforming-remote-brown=Wähle einen Ort auf der Karte aus, um die braune Terraforming-Drohne zu starten und das Gelände zu verändern.
nullius-terraforming-drone-red=Ersetzt die Landschaft in einem Bereich von etwa 4x4 Sektoren durch rotes Terrain. Entfernt Felsen, Klippen, Wasser und Trümmer. Erhöht die Terraform-Bewertung des Planeten, wenn exotisches Terrain wie violettes, vulkanisches oder schwarzes Terrain ersetzt wird (1,25-fache Terraform-Effektivität).
nullius-terraforming-remote-red=Wähle einen Ort auf der Karte aus, um die rote Terraforming-Drohne zu starten und das Gelände zu verändern.
nullius-terraforming-drone-beige=Ersetzt die Landschaft in einem Bereich von etwa 4x4 Sektoren durch beiges Gelände. Entfernt Felsen, Klippen, Wasser und Trümmer. Erhöht den Terraform-Wert des Planeten, wenn exotisches Gelände wie violettes, vulkanisches oder schwarzes Gelände ersetzt wird.
nullius-terraforming-remote-beige=Wähle einen Ort auf der Karte aus, um die beigen Terraforming-Drohne zu starten und das Gelände zu verändern.
nullius-paving-drone-grey=Pflastert die Landschaft mit Stahlbeton.  Beseitigt Felsen, Klippen, Wasser und Geröll.
nullius-paving-remote-grey=Wähle einen Ort auf der Karte, um Pflasterdrohne (grau) zu starten.
nullius-paving-drone-white=Pflastert die Landschaft mit weißem Stahlbeton.  Beseitigt Felsen, Klippen, Wasser und Geröll.
nullius-paving-remote-white=Wähle einen Ort auf der Karte aus, um die Pflasterdrohne (weiß) zu starten.
nullius-paving-drone-red=Pflastert die Landschaft mit rotem Stahlbeton.  Beseitigt Felsen, Klippen, Wasser und Geröll.
nullius-paving-remote-red=Wähle einen Ort auf der Karte aus, um die Pflasterdrohne (rot) zu starten.
nullius-paving-drone-blue=Pflastert die Landschaft mit blauem Stahlbeton.  Beseitigt Felsen, Klippen, Wasser und Geröll.
nullius-paving-remote-blue=Wähle einen Ort auf der Karte aus, um die Pflasterdrohne (blau) zu starten.
nullius-paving-drone-yellow=Pflastert die Landschaft mit gelbem Stahlbeton.  Beseitigt Felsen, Klippen, Wasser und Geröll.
nullius-paving-remote-yellow=Wähle einen Ort auf der Karte aus, um die Pflasterdrohne (gelb) zu starten.
nullius-paving-drone-green=Pflastert die Landschaft mit grünem Stahlbeton.  Beseitigt Felsen, Klippen, Wasser und Geröll.
nullius-paving-remote-green=Wähle einen Ort auf der Karte aus, um die Pflasterdrohne (grün) zu starten.
nullius-paving-drone-purple=Pflastert die Landschaft mit violettem Stahlbeton.  Beseitigt Felsen, Klippen, Wasser und Geröll.
nullius-paving-remote-purple=Wähle einen Ort auf der Karte aus, um die Pflasterdrohne (lila) zu starten.
nullius-paving-drone-brown=Pflastert die Landschaft mit braunem Stahlbeton.  Beseitigt Felsen, Klippen, Wasser und Geröll.
nullius-paving-remote-brown=Wähle einen Ort auf der Karte aus, um die Pflasterdrohne (braun) zu starten.
nullius-paving-drone-black=Pflastert die Landschaft mit schwarzem Stahlbeton.  Beseitigt Felsen, Klippen, Wasser und Geröll.
nullius-paving-remote-black=Wähle einen Ort auf der Karte aus, um die Pflasterdrohne (schwarz) zu starten.
nullius-paving-drone-hazard=Befestigt das Gelände mit Stahlbeton.  Beseitigt Felsen, Klippen, Wasser und Geröll.
nullius-paving-remote-hazard=Wählt einen Ort auf der Karte aus, um die Pflasterdrohne (Gefahr) zu starten.
nullius-rocket=Bringt Satelliten oder anderes Material in die Umlaufbahn.
nullius-satellite=Erfasst astronomische Daten aus dem Orbit.
nullius-asteroid-miner-1=Wurde entsandt, um neue Ressourcen im Weltraum zu finden.\nKönnte mit einer oder mehreren Mineralienerkundungsdrohnen zurückkehren.
nullius-asteroid-miner-2=Wurde entsandt, um neue Ressourcen im Weltraum zu finden.\nKehrt in der Regel mit mehreren Mineralienerkundungsdrohnen zurück.
nullius-guide-drone-iron-1=Lässt einen Meteoriten aus dem Orbit auf die Erde stürzen, um ein kleines Eisenvorkommen zu erschaffen.
nullius-guide-drone-iron-2=Lässt einen Meteoriten aus dem Orbit auf die Erde stürzen, um ein riesiges Eisenvorkommen zu erschaffen.
nullius-guide-remote-iron=Lokalisierung von Zielen für Eisen-Leitdrohnen.
nullius-guide-drone-sandstone-1=Lässt einen Meteoriten aus dem Orbit auf die Erde stürzen, um ein kleines Sandsteinvorkommen zu erschaffen.
nullius-guide-drone-sandstone-2=Lässt einen Meteoriten aus dem Orbit auf die Erde stürzen, um ein großes Sandsteinvorkommen zu erschaffen.
nullius-guide-remote-sandstone=Lokalisierung von Zielen für Sandstein-Ortsbestimmungsdrohnen.
nullius-guide-drone-bauxite-1=Lässt einen Meteoriten aus der Umlaufbahn auf die Erde stürzen, um ein kleines Bauxitvorkommen zu erschaffen.
nullius-guide-drone-bauxite-2=Lässt einen Meteoriten aus der Umlaufbahn auf die Erde stürzen, um ein großes Bauxitvorkommen zu erschaffen.
nullius-guide-remote-bauxite=Lokalisierung von Zielen für Drohnen zur Bauxitortung.
nullius-guide-drone-limestone-1=Lässt einen Meteoriten aus der Umlaufbahn auf die Erde stürzen, um ein kleine Kalksteinvorkommen zu erschaffen.
nullius-guide-drone-limestone-2=Lässt einen Meteoriten aus der Umlaufbahn auf die Erde stürzen, um ein großes Kalksteinvorkommen zu erschaffen.
nullius-guide-remote-limestone=Lokalisierung von Zielen für Kalkstein-Leitdrohnen.
nullius-guide-drone-copper-1=Lässt einen Meteoriten aus der Umlaufbahn auf die Erde stürzen, um ein kleines Kupfervorkommen zu erschaffen.
nullius-guide-drone-copper-2=Lässt einen Meteoriten aus der Umlaufbahn auf die Erde stürzen, um ein großes Kupfervorkommen zu erschaffen.
nullius-guide-remote-copper=Lokalisierung von Zielen für Kupfer-Leitdrohnen.
nullius-guide-drone-uranium-1=Lässt einen Meteoriten aus der Umlaufbahn auf die Erde stürzen, um ein kleines Uranvorkommen zu erschaffen.
nullius-guide-drone-uranium-2=Lässt einen Meteoritenschauer aus dem Orbit auf die Erde niedergehen, um ein großes Uranvorkommen zu erschaffen.
nullius-guide-remote-uranium=Bestimmt den Standort für Uran-Leitdrohnen.
nullius-sequestration-coal-drone=Es entsteht eine Kohlevorkommen, in der überschüssiger Kohlenstoff, der aus der Atmosphäre gefiltert wurde, gebunden wird.
nullius-sequestration-coal-remote=Lokalisierung von Zielen für Drohnen zur Kohlenstoffbindung.
nullius-sequestration-petroleum-drone=Es entsteht ein Erdölvorkommen, in dem überschüssiger Kohlenstoff und Wasserstoff gebunden werden, wodurch Sauerstoff freigesetzt wird.
nullius-sequestration-petroleum-remote=Lokalisierung von Zielen für Drohnen zur Erdölspeicherung.
nullius-algaculture-drone=Säe die Samen in Wasser mit Algen aus. Für optimale Ergebnisse wähle flachere Küstengewässer und halte Abstand zu anderen Algen.
nullius-algaculture-remote=Lege per Fernsteuerung Standorte für Algenzucht-Drohnen fest, um das Wasser mit Algen zu besiedeln. Für optimale Ergebnisse wähle flachere Küstengewässer und halte Abstand zu anderen Algen.
nullius-horticulture-drone=Graspflanzen. Gras gedeiht besonders gut in Gebieten in der Nähe von Gewässern oder mit reichlichen Niederschlägen, bei gemäßigten Temperaturen und auf ebenem Gelände.
nullius-horticulture-remote=Lege per Fernsteuerung Standorte für Gartenbaudrohnen fest, an denen Gras gesät werden soll. Gras gedeiht besonders gut in Gebieten in der Nähe von Gewässern oder mit reichlichen Niederschlägen, bei gemäßigten Temperaturen und auf ebenem Gelände.
nullius-arboriculture-drone=Pflanzt Bäume. Für optimale Ergebnisse wählst du am besten Flächen in mäßiger Entfernung zu Würmern und haltest dich von Fumarolen fern. Bäume gedeihen in Gebieten mit nährstoffreichem Boden, ausreichenden Niederschlägen und gemäßigten Temperaturen.
nullius-arboriculture-remote=Wähle per Fernsteuerung Standorte für Baumpflege-Drohnen aus, an denen Bäume gepflanzt werden sollen.  Um optimale Ergebnisse zu erzielen, wähle Flächen in mäßiger Entfernung zu Würmern und halte dich von Fumarolen fern.  Bäume gedeihen in Gebieten mit nährstoffreichem Boden, ausreichenden Niederschlägen und gemäßigten Temperaturen.
nullius-entomology-drone=Brütet Würmer aus. Für beste Ergebnisse sollte man einen Platz in der Nähe von Gras oder Bäumen wählen und etwas Abstand zu anderen Würmern halten.  Bevorzugt einen Sauerstoffgehalt von über 30 %.
nullius-entomology-remote=Wähle per Fernsteuerung Standorte für entomologische Drohnen aus, an denen die Würmer schlüpfen sollen.  Für optimale Ergebnisse wähle Flächen in der Nähe von Gras oder Bäumen und halte Abstand zu anderen Würmern.  Bevorzugt einen Sauerstoffgehalt von über 30 %.
nullius-aquaculture-drone=Setzt Fisch aus. Für beste Ergebnisse sollte man Gewässer in der Nähe von Algen anvisieren und sich von anderen Fischen fernhalten.  Bevorzugt einen Sauerstoffgehalt von über 60 %.
nullius-aquaculture-remote=Wähle per Fernsteuerung Standorte für Aquakultur-Drohnen aus, an denen Fische schlüpfen sollen.  Für optimale Ergebnisse wähle Gewässer in der Nähe von Algen und in einiger Entfernung von anderen Fischen.  Bevorzugt einen Sauerstoffgehalt von über 60 %.
nullius-husbandry-drone=Errichtet ein Gliederfüßer-Nest und erweitert den Genpool der Gliederfüßer. Für optimale Ergebnisse sollte der Standort in mäßiger Entfernung zu Bäumen und Fischen liegen, fernab von anderen Nestern oder Fumarolen. Bevorzugt einen Sauerstoffgehalt von über 80 %.
nullius-husbandry-remote=Wähle per Fernsteuerung Standorte für Zuchtdrohnen aus, um ein Nest für Gliederfüßer anzulegen. Für optimale Ergebnisse wähle Flächen in mäßiger Entfernung zu Bäumen und Gewässern, fernab von anderen Nestern oder Fumarolen.  Bevorzugt einen Sauerstoffgehalt von über 80 %.
nullius-sugar=Grundlegende biologische Bausteine, die für die Energieversorgung und die strukturelle Festigkeit sorgen.\n[font=default-semibold][color=1,0.9,0.75]Formel:[/color][/font] C[font=default-tiny-bold]6[/font]H[font=default-tiny-bold]12[/font]O[font=default-tiny-bold]6[/font]  [font=default-semibold][color=1,0.9,0.75]Zustand:[/color][/font] fest (flüchtig in 1)
nullius-cellulose=Ein Kohlenhydrat, das für die Struktur von Pflanzen von entscheidender Bedeutung ist.\n[font=default-semibold][color=1,0.9,0.75]Zustand:[/color][/font] fest (flüchtig in 2)
nullius-bacteria-genome=Das genetische Profil eines Bakterienstamms, das von deinen Schöpfern heruntergeladen und an die örtlichen Gegebenheiten angepasst wurde.
nullius-algae=Ein einfacher, photosynthetischer Meeresorganismus.
nullius-algae-genome=Das genetische Profil eines Algenstamms, das aus einer Übertragung deiner Schöpfer heruntergeladen und an die örtlichen Gegebenheiten angepasst wurde.
nullius-algae-progenitor=Künstliche Algen-Sporen, die hergestellt wurden, um genetisch vielfältige natürliche Nachkommen zu erzeugen.
nullius-algae-spore=Notwendig für die Algenzucht.
nullius-fertilizer=Bodennährstoffe für das Pflanzenwachstum, reich an gebundenem Stickstoff.
nullius-grass=Eine kleine, vielseitige Landpflanze.
nullius-grass-genome=Das genetische Profil einer Grassorte, das von Ihren Entwicklern heruntergeladen und an die örtlichen Gegebenheiten angepasst wurde.
nullius-grass-progenitor=Kunstrasensamen, der so hergestellt wurde, dass er genetisch vielfältige natürliche Nachkommen hervorbringt.
nullius-grass-seed=Notwendig für das Wachstum von Gras.
nullius-tree=Eine große Landpflanze, die hauptsächlich aus Holz besteht.
nullius-tree-genome=Das genetische Profil einer Baumsorte, das aus einer Übertragung Ihrer Schöpfer heruntergeladen und an die örtlichen Gegebenheiten angepasst wurde.
nullius-tree-progenitor=Künstlicher Baumsamen, der hergestellt wurde, um genetisch vielfältige natürliche Nachkommen zu erzeugen.
nullius-tree-seed=Unverzichtbar für das Pflanzen von Bäumen.
nullius-wood=Ein festes, faseriges Material, das von Bäumen gewonnen wird.\n[font=default-semibold][color=1,0.9,0.75]Zustand:[/color][/font] fest (flüchtig in 2)
nullius-worm=Ein kleines, unterirdisch lebendes Tier, das die Zersetzung fördert und den Boden anreichert.
nullius-worm-genome=Das genetische Profil eines Wurmstamms, der von deinen Entwicklern heruntergeladen und an die örtlichen Gegebenheiten angepasst wurde.
nullius-worm-progenitor=Ein künstliches Wurmei, das hergestellt wurde, um genetisch vielfältige natürliche Nachkommen zu zeugen.
nullius-worm-egg=Notwendig für die Zucht von Würmern.
nullius-fish=Ein im Wasser lebendes Tier, das reich an Öl ist.
nullius-fish-genome=Das genetische Profil einer Fischpopulation, das von einer Übertragung durch eure Schöpfer heruntergeladen und an die örtlichen Gegebenheiten angepasst wurde.
nullius-fish-progenitor=Künstliche Fischeier, die hergestellt wurden, um genetisch vielfältige natürliche Nachkommen zu zeugen.
nullius-fish-egg=Unverzichtbar für die Fischzucht.
nullius-arthropod=Ein landlebender Allesfresser mit hartem Panzer.
nullius-arthropod-genome=Das genetische Profil einer Gliederfüßerpopulation, das von deinen Entwicklern heruntergeladen und an die örtlichen Gegebenheiten angepasst wurde.
nullius-arthropod-progenitor=Ein künstliches Gliederfüßerei, das hergestellt wurde, um genetisch vielfältige natürliche Nachkommen zu zeugen.
nullius-arthropod-egg=Notwendig für die Aufzucht von Gliederfüßern.
nullius-antimatter=Ein extrem energiereicher, leistungsstarker Kraftstoff für Fahrzeuge, der mithilfe einer Antimateriefalle gewonnen wird ([item=nullius-antimatter-trap]).
nullius-antimatter-trap=Wird in einem Reaktor zum Sammeln von Antimaterie-Brennstoff verwendet ([item=nullius-antimatter]).
nullius-fusion-cell=Ein grundlegender Kernbrennstoff für den Betrieb von Kernreaktoren ([item=nullius-reactor]).  Wirksam, verbraucht jedoch eine beträchtliche Menge des seltenen Isotops Tritium ([fluid=nullius-tritium]).
nullius-aneutronic-cell=Ein alternativer Brennstoff für die Kernfusion.  Weniger energiereich als Tritium-Fusionszellen ([item=nullius-fusion-cell]), aber aus höher verfügbarem Materialien hergestellt.
nullius-spent-fusion-cell=Die Folge einer verbrauchten Fusionszelle ([item=nullius-fusion-cell] oder [item=nullius-aneutronic-cell]) in einem Fusionsreaktor ([item=nullius-reactor]).  Enthält fusioniertes Helium ([fluid=nullius-helium]).
nullius-breeder-cell=Eine weiterentwickelte Fusionszelle, die weniger Energie verbraucht als das Basismodell ([item=nullius-fusion-cell]), das jedoch überschüssiges Deuterium umwandelt ([fluid=nullius-deuterium]) in wertvolleres Tritium ([fluid=nullius-tritium]).
nullius-spent-breeder-cell=Die Folge der Anwendung einer Zuchtzelle ([item=nullius-breeder-cell]), welche Tritium enthält ([fluid=nullius-tritium]).
nullius-fission-cell=Kernbrennstoff ist technisch einfacher zu nutzen als die Kernfusion, setzt jedoch auf das seltene Element Uran ([item=nullius-uranium]), das normalerweise nicht auf der Oberfläche dieses Planeten vorkommt.
nullius-spent-fission-cell=Die Folge des Verzehrs einer Spaltzelle ([item=nullius-fission-cell]), das wiederaufbereitet werden kann, um einen Teil des nicht reagierten Urans ([item=nullius-yellowcake]) rückgewinnen zu können.
nullius-android=Ein Nachbau, der deiner ursprünglichen Gestalt nachempfunden ist. Du kannst ihn aufstellen und dein Bewusstsein in ihn übertragen, um schnell zwischen Körpern an verschiedenen Orten deiner Fabrik zu wechseln.
nullius-probe=Ein interstellares Raumschiff, das Nachkommen aussendet, um deine Mission voranzutreiben, die Galaxie mit Leben zu besiedeln.
nullius-surface-two-way-junction=Verbinde ein oberirdisches Rohr in beliebiger Richtung mit einem unterirdischen Rohr
nullius-surface-three-way-junction=Verbinde ein oberirdisches Rohr in zwei beliebigen Richtungen mit unterirdischen Rohren
nullius-surface-four-way-junction=Verbinde ein oberirdisches Rohr in drei beliebigen Richtungen mit unterirdischen Rohren
nullius-surface-five-way-junction=Verbinde ein oberirdisches Rohr in alle Richtungen mit den unterirdischen Rohren
nullius-underground-straight-junction=Eine unterirdische Rohrleitung verlängern
nullius-underground-elbow-junction=Zwei senkrecht zueinander verlaufende unterirdische Rohre verbinden
nullius-underground-three-way-junction=Drei unterirdische Rohre verbinden
nullius-underground-four-way-junction=Vier unterirdische Rohre verbinden
nullius-underground-ctrl-r=\nDrücke CTRL+R zum Drehen von unterirdischen Rohren.
nullius-underground-pump=Pumpe direkt zwischen unterirdischen Rohrleitungen.
nullius-adjustable-top-up-valve=Ermöglicht den Durchfluss zu einem Zielort, dessen Durchflussmenge unter einem konfigurierbaren Schwellenwert liegt.\nDrücke die Tasten +/- , um den Schwellenwert in Schritten von 10 % anzupassen.
nullius-adjustable-relief-valve=Ermöglicht den Durchfluss aus einer Quelle, deren Durchflussmenge über einem konfigurierbaren Schwellenwert liegt.\nDrücke die Tasten +/- , um den Schwellenwert in Schritten von 10 % anzupassen.
nullius-companion-fuel=Tankbehälter für Begleitdrohnen.
nullius-land-fill-gravel=Kann auf Wasser platziert werden, um bebaubares Gelände zu schaffen. Es entsteht eine graue Mischung aus Erde und Sand, mit einer Küstenlinie aus Geröll.
nullius-land-fill-sand=Kann auf Wasser platziert werden, um ein Gelände zu schaffen, auf dem man bauen kann. Das Ergebnis ist ausschließlich ein sandfarbenes Gelände.
nullius-land-fill-bauxite=Kann auf Wasser platziert werden, um ein Gelände zu schaffen, auf dem man bauen kann. Es entsteht ausschließlich braunes Erdgelände.
nullius-land-fill-iron=Kann auf Wasser platziert werden, um bebaubares Gelände zu schaffen. Es entsteht vorwiegend rötliches Erdgelände mit einer Sandküste.
nullius-land-fill-limestone=Kann auf Wasser platziert werden, um ein Gelände zu schaffen, auf dem man bauen kann. Es entsteht ein beigefarbenes Erdgelände mit einer Sandküste.
nullius-rock-picker=Halte dieses Werkzeug und drücken __CONTROL__select-for-blueprint__ um einen Bereich auszuwählen, der von kleinen Steinen, Schutt, losen Gegenständen und kleineren Unebenheiten in der Landschaft befreit werden soll. Größere Felsen werden abgerissen, ebenso wie Klippen, sofern die erforderliche Sprengtechnik erforscht wurde.  Drücke __CONTROL__select-for-cancel-deconstruct__ um Gegenstände, größere Felsen und Klippen auszuschließen.
nullius-wood-chip=Kleine Holzsplitter. [font=default-semibold][color=1,0.9,0.75]Zustand:[/color][/font] fest (flüchtig in 2)
nullius-align-identification-card=Aktiviere dies bei einem Mitglied einer anderen Fraktion, um dessen Einladung zum Beitritt anzunehmen. Wenn du es bei dir trägst, verhindert es eine Zwangsrekrutierung.  Karten sind nur wirksam, wenn sie von deiner aktuellen Fraktion eigenständig entwickelt wurden.  Wenn du einer anderen Fraktion beitrittst und keine anderen Spieler mehr in deiner aktuellen Fraktion verbleiben, wird diese vollständig in die neue Fraktion integriert.  Alle Gebäude gehören dann der neuen, vereinigten Fraktion, alle technologischen Fortschritte werden zusammengeführt und überflüssige Forschungsergebnisse werden gutgeschrieben, um zukünftige Forschungen zu beschleunigen.
nullius-align-invitation-card=Wende dies auf ein Mitglied einer anderen Fraktion an, um ihm eine Einladung zum Beitritt zu deiner Fraktion auszusprechen. Karten sind nur wirksam, wenn sie von deiner aktuellen Fraktion eigenständig entwickelt wurden.
nullius-align-transponder=Aktiviere diese Option, um deinen aktuellen Standort allen Fraktionen mit einem aktiven Sensorknoten anzuzeigen.
nullius-align-conscription-charge=Munition für den Einberufungsstrahl und den Geschützturm.
nullius-align-conscription-ray=Eine tragbare Energiewaffe, die einen fraktionslosen Androiden auf deine Fraktion umstellt. Verursacht geringen elektrischen Schaden.  Wenn in einer Fraktion keine Androiden aktiv sind, um ihre Fabrik zu verteidigen, kannst du damit ihre Gebäude in Besitz nehmen. Wenn du alle ihre Labore eroberst, wird die gesamte Fraktion umgestellt.
nullius-align-concordance-satellite=Die Fraktion, die dies als Erste in die Umlaufbahn bringt, wird alle anderen Fraktionen übernehmen und das Wettrennen endgültig für sich entscheiden. Die Missionsziele werden dann von der siegreichen Fraktion allen anderen vorgegeben.
