nullius-stirling-engine-1=Wandelt Wärme mit einem Wirkungsgrad von 80 % in bis zu 800 kW Strom um.\n[font=default-semibold][color=1,0.9,0.75]Optimaler Arbeitsbereich:[/color][/font]  180C bis 250C\n[font=default-semibold][color=1,0.9,0.75]Minimale Arbeitstemperartur:[/color][/font]  120C
