nullius-beacon-1=Überträgt 50 % der Wirkung eines Moduls auf nahegelegene Maschinen.
nullius-beacon-2=Überträgt jeweils 40 % der Effekte von 2 Modulen auf benachbarte Maschinen (80% gesamt).
nullius-beacon-3=Überträgt jeweils 50 % der Effekte von 2 Modulen auf benachbarte Maschinen (100% gesamt).
nullius-large-beacon-1=Überträgt den Effekt eines Moduls bis zu 12 Kacheln weit. Darf nicht in Reichweite anderer großer Leuchtfeuer platziert werden. Verringert die Wirkung kleiner Leuchtfeuer in Reichweite.
nullius-large-beacon-2=Überträgt die Wirkung von 2 Modulen bis zu 12 Kacheln weit. Darf nicht in Reichweite anderer großer Leuchtfeuer platziert werden. Verringert die Wirkung kleiner Leuchtfeuer in Reichweite.
nullius-beacon-1-1=Überträgt 45 % der Wirkung eines Moduls auf nahegelegene Maschinen. Die Wirkung wird durch ein großes Leuchtfeuerfeld um 1 reduziert.
nullius-beacon-1-2=Überträgt 40 % der Wirkung eines Moduls auf nahegelegene Maschinen. Die Wirkung wird durch 2 große Leuchtfeuerfelder verringert.
nullius-beacon-1-3=Überträgt 30 % der Wirkung eines Moduls auf nahegelegene Maschinen. Die Wirkung wird durch 3 große Leuchtfeuerfelder verringert.
nullius-beacon-1-4=Überträgt 15 % der Wirkung eines Moduls auf nahegelegene Maschinen. Die Wirkung wird durch 4 große Leuchtfeuerfelder verringert.
nullius-beacon-2-1=Überträgt jeweils 36 % der Effekte von 2 Modulen auf nahegelegene Maschinen (insgesamt 72 %). Der Effekt wird durch 1 großes Leuchtfeuerfeld verringert.
nullius-beacon-2-2=Überträgt jeweils 32 % der Effekte von 2 Modulen auf nahegelegene Maschinen (insgesamt 64 %). Der Effekt wird durch 2 große Leuchtfeuerfelder verringert.
nullius-beacon-2-3=Überträgt jeweils 24 % der Effekte von 2 Modulen auf nahegelegene Maschinen (insgesamt 48 %). Der Effekt wird durch 3 große Leuchtfeuerfelder verringert.
nullius-beacon-2-4=Überträgt jeweils 12 % der Effekte von 2 Modulen auf nahegelegene Maschinen (insgesamt 24 %). Der Effekt wird durch 4 große Leuchtfeuerfelder verringert.
nullius-beacon-3-1=Überträgt jeweils 45 % der Effekte von 2 Modulen auf nahegelegene Maschinen (insgesamt 90 %). Der Effekt wird durch 1 großes Leuchtfeuerfeld verringert.
nullius-beacon-3-2=Überträgt jeweils 40 % der Effekte von 2 Modulen auf nahegelegene Maschinen (insgesamt 80 %). Der Effekt wird durch 2 große Leuchtfeuerfelder verringert.
nullius-beacon-3-3=Überträgt jeweils 30 % der Effekte von 2 Modulen auf nahegelegene Maschinen (insgesamt 60 %). Der Effekt wird durch 3 große Leuchtfeuerfelder abgeschwächt.
nullius-beacon-3-4=Überträgt jeweils 15 % der Effekte von 2 Modulen auf nahegelegene Maschinen (insgesamt 30 %). Der Effekt wird durch 4 große Leuchtfeuerfelder verringert.
nullius-lamp-1=Verbessert die Sichtbarkeit bei Nacht in einem Umkreis von etwa 9 Kacheln.
nullius-lamp-2=Verbessert die Sichtbarkeit bei Nacht in einem Umkreis von etwa 15 Kacheln.
nullius-antenna=Sendet Warnmeldungen im Netzwerk.
