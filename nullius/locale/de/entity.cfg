nullius-fumarole=Vulkanstandort, geeignet für ein Geothermiekraftwerk oder die Gewinnung von Vulkangas. Ein Geothermiekraftwerk ist unabhängig von der Ressourcenfülle und führt nicht zu einer Erschöpfung der Ressource. Unbegrenztes Vulkangas erschöpft sich auf 25 % der ursprünglichen Fördermenge.
nullius-fumarole-finite=Vulkanstandort, geeignet für ein Geothermiekraftwerk oder die Gewinnung von Vulkangas. Ein Geothermiekraftwerk ist unabhängig von der Ressourcenfülle und führt nicht zur Erschöpfung der Ressource. Die Vulkangasquelle ist begrenzt und versiegt, sobald sie vollständig erschöpft ist.
nullius-hydrothermal-vent=Eine Tiefseequelle für vulkanisches Gas, die mit einem Offshore-Fördergerät genutzt werden kann. Die unbegrenzte Menge an vulkanischem Gas verringert sich auf 25 % der ursprünglichen Fördermenge.
nullius-offshore-extractor=Schwimmende Förderplattform für hydrothermale Quellen.  Mit einem Wärmekraftwerk, das den eigenen Strombedarf sowie den der angeschlossenen Pumpen deckt.
or_pole=Leistung von Offshore-Absauganlagen
nullius-loader=Befördert Gegenstände zu oder von einem Behälter oder einer Maschine mit der Geschwindigkeit eines passenden Förderbands.
nullius-align-conscription-turret=Verteidigungsanlage, die automatisch Rekrutierungsstrahlen auf gegnerische Fraktionen abfeuert.
nullius-align-concordance-transmitter=Neu hinzukommende Androiden treten zunächst einer Fraktion mit einem aktiven Sender bei, anstatt selbst einen zu gründen. Schützt alle Spieler und Gebäude vor der Einberufung, solange er aktiv ist. Deckt nach und nach entfernte Sektoren auf.
inserterToggleInfo=Drücke Umschalt+L, um zwischen dem langen und dem normalen Greifarmen zu wechseln (verfügbar, wenn die Erweiterung freigeschaltet ist)
nullius-cargo-drone-mooring=Ein Verankerungsturm. Erfordert einen Luftraum, der nicht durch Windkraftanlagen und andere Verankerungen behindert wird.

