nullius-furnace=Wendet extreme Hitze an, um Metalle aus Erzen zu gewinnen.
nullius-large-furnace=Raffiniert große Mengen Metall aus Erz.
nullius-air-filter-1=Nimmt Luft aus der Atmosphäre auf und filtert sie. (bis zu 50/s).
nullius-air-filter-2=Nimmt Luft aus der Atmosphäre auf und filtert sie. (bis zu 150/s).
nullius-air-filter-3=Nimmt Luft aus der Atmosphäre auf und filtert sie. (bis zu 400/s).
nullius-well-1=Pumpt Grundwasser aus dem Untergrund (bis zu 100/s).
nullius-well-2=Pumpt Grundwasser aus dem Untergrund (bis zu 400/s).
nullius-seawater-intake-1=Vor der Küste platzieren, um Meerwasser zu gewinnen (bis zu 125/s).
nullius-seawater-intake-2=Vor der Küste platzieren, um Meerwasser zu gewinnen (bis zu 500/s).
nullius-chimney-1=Leitet überschüssiges Gas in die Atmosphäre (bis zu 100/s). Komprimierte Gase werden mit halber Geschwindigkeit freigesetzt.
nullius-chimney-2=Leitet überschüssiges Gas in die Atmosphäre (bis zu 500/s). Komprimierte Gase werden mit halber Geschwindigkeit freigesetzt.
nullius-chimney-3=Leitet überschüssiges Gas in die Atmosphäre (bis zu 2000/s). Komprimierte Gase werden mit halber Geschwindigkeit freigesetzt.
nullius-outfall-1=Leitet überschüssige Flüssigkeit ins Meer (bis zu 100/s).
nullius-outfall-2=Leitet überschüssige Flüssigkeit ins Meer (bis zu 400/s).
nullius-outfall-3=Leitet überschüssige Flüssigkeit ins Meer (bis zu 1000/s).
nullius-hydro-plant=Filtert Verunreinigungen und behandelt Wasser.
nullius-distillery=Trennt gemischte Flüssigkeiten in ihre Bestandteile.
nullius-small-assembler-1=Setzt kleine Zwischen- und Endprodukte zusammen.
nullius-small-assembler-2=Setzt kleine Zwischen- und Endprodukte zusammen.
nullius-small-assembler-3=Setzt kleine Zwischen- und Endprodukte zusammen.
nullius-medium-assembler-1=Setzt Zwischen- und Endprodukte zusammen.
nullius-medium-assembler-2=Setzt Zwischen- und Endprodukte zusammen.
nullius-medium-assembler-3=Setzt Zwischen- und Endprodukte zusammen.
nullius-large-assembler-1=Setzt große Zwischen- und Fertigprodukte zusammen.
nullius-large-assembler-2=Setzt große Zwischen- und Fertigprodukte zusammen.
nullius-miner=Extrahiert Erz, wenn es auf ein natürliches Vorkommen aufgebracht wird.
nullius-foundry-1=Formt Metallbarren in grundlegende Zwischenformen.
nullius-foundry-2=Formt Metallbarren in grundlegende Zwischenformen.
nullius-foundry-3=Formt Metallbarren in grundlegende Zwischenformen.
nullius-crusher-1=Zerkleinert Gestein zu feineren Partikeln und sortiert diese.
nullius-crusher-2=Zerkleinert Gestein zu feineren Partikeln und sortiert diese.
nullius-crusher-3=Zerkleinert Gestein zu feineren Partikeln und sortiert diese.
nullius-flotation-cell=Lässt Feststoffe mit der Zeit reagieren, die in Flüssigkeiten eingetaucht sind.
nullius-electrolyzer=Spaltet Flüssigkeiten in Ionen.
nullius-compressor=Komprimiert Gas. Komprimiertes Gas kann für schnellere chemische Reaktionen, höhere Durchflussraten in Rohrleitungen oder als Medium zur Energiespeicherung verwendet werden.
nullius-togglable-pump=Wechsel zwischen Pump- und Ventilmodus mit __CONTROL__configurable-valves-switch__
nullius-prioritize=__1__  Der Stromverbrauchsmodus kann zwischen zwei Zuständen durch __CONTROL__nullius-prioritize__ umgeschaltet werden.
nullius-surge=__1__  Nutzt überschüssigen Strom erst, nachdem der übrige Bedarf gedeckt ist. Mit __CONTROL__nullius-prioritize__ in den Prioritätsmodus wechseln.
nullius-priority=__1__  Verbraucht normal Strom. In den Überspannungsmodus mit __CONTROL__nullius-prioritize__ schalten.
nullius-turbine-open=Erzeugt Strom aus komprimiertem Gas oder Dampf und leitet diese in die Atmosphäre ab.
nullius-turbine-closed=Erzeugt Strom aus komprimiertem Gas oder Dampf und gewinnt dabei den größten Teil des unkomprimierten Arbeitsmediums zurück.
nullius-turbine-item=__1__  Der Stromerzeugungsmodus kann mithilfe von einem von drei Zuständen konfiguriert werden __CONTROL__nullius-prioritize__.
nullius-turbine-entity=__1__  __2__\nIn die Stromerzeugungsmodus umschalten mit __CONTROL__nullius-prioritize__.
nullius-turbine-info=__3__\n[font=default-semibold][color=1,0.9,0.75]Max Leistung:[/color][/font]  __1__MW\n[font=default-semibold][color=1,0.9,0.75]Effizienz:[/color][/font]  __2__%
nullius-turbine-backup=Dient ausschließlich als Reservebatterie für den ungedeckten Bedarf. Lädt weder Überspannungsschutzgeräte noch Netzbatterien. Nützlich für die Energiespeicherung mit Überspannungsschutzgeräten.
nullius-turbine-standard=Wird eingesetzt, wenn Wind- und Sonnenenergie nicht ausreichen.  Nützlich zur Stromerzeugung aus dem Dampf des Wärmetauschers.
nullius-turbine-exhaust=Primäre Energiequelle wie Windkraftanlagen.  Arbeitet unabhängig davon, ob die erzeugte Energie benötigt wird oder nicht.  Nützlich, um aus Nebenproduktmanagement oder Dekompression zusätzliche Energie zu gewinnen, wenn der Durchfluss nicht unterbrochen werden darf.
nullius-combustion-chamber=Nutzt gelagerte chemische Brennstoffe, um Dampf zu erzeugen.
nullius-boiler=Erhitzt mithilfe von Strom Wasser zu Dampf.
nullius-chemical-plant=Katalyisiert eine Vielzahl chemischer Reaktionen.
nullius-one-way-valve=Lässt den Durchfluss nur in eine Richtung zu. Nützlich, um einen Rückfluss zu verhindern. Kann zur Verlängerung von Rohrleitungen verwendet werden, allerdings bei verringertem Durchfluss
nullius-relief-valve=Ermöglicht den Durchfluss aus einer Quelle mit einem Volumen von über 75 %.  Nützlich, um überschüssige Mengen eines Nebenprodukts abzulassen und so eine Blockierung der Produktion zu vermeiden.
nullius-top-up-valve=Ermöglicht den Durchfluss in einen Speicher mit weniger als 50 % Füllvolumen.  Dies ist nützlich, wenn du über zwei Quellen derselben Flüssigkeit verfügst, und zwar sowohl als Nebenprodukt als auch als Hauptprodukt.  Verwende dieses Ventil, um einen Tank über die Hauptproduktleitung zu befüllen und nicht über die Nebenproduktleitung. So wird die Nutzung des Nebenprodukts priorisiert, solange es in ausreichender Menge vorhanden ist, und andernfalls wird es auf direkte Weise hergestellt.
nullius-priority-valve=Ermöglicht den Durchfluss aus einer Quelle mit einem Füllstand von über 25 %.  Nützlich, wenn eine einzige Flüssigkeit an mehrere Ziele unterschiedlicher Priorität verteilt werden soll.  Verwende das Ventil zur Versorgung einer Rohrleitung von untergeordneter Bedeutung, sodass es nur dann versorgt wird, wenn der Tank über ausreichende Vorräte verfügt, um den Primärbedarf zu decken.
nullius-pipe=Befördert Flüssigkeiten.
nullius-underground-pipe=Befördert Flüssigkeiten.
nullius-small-tank-1=Nimmt wenig Flüssigkeit auf.
nullius-small-tank-2=Nimmt wenig Flüssigkeit auf.
nullius-medium-tank-1=Nimmt Flüssigkeit auf.
nullius-medium-tank-2=Nimmt Flüssigkeit auf.
nullius-medium-tank-3=Nimmt Flüssigkeit auf.
nullius-large-tank-1=Nimmt Flüssigkeit auf und zwar jede Menge.
nullius-large-tank-2=Nimmt Flüssigkeit auf und zwar jede Menge.
nullius-large-tank-3=Nimmt Flüssigkeit auf und zwar jede Menge.
nullius-barrel-pump-1=Befüllt oder entleert Fässer mit Flüssigkeit.
nullius-barrel-pump-2=Befüllt oder entleert Fässer mit Flüssigkeit.
nullius-pump-1=Notwendig, um Rohrleitungen über größere Entfernungen zu verlegen. Pumpen bis zu 3000/s\n
nullius-pump-2=Notwendig, um Rohrleitungen über größere Entfernungen zu verlegen. Pumpen bis zu 6000/s\n
nullius-pump-3=Notwendig, um Rohrleitungen über größere Entfernungen zu verlegen. Pumpen bis zu 12000/s\n
nullius-configurable-pump=Kann mithilfe von Schaltzuständen als Überlauf-, Nachfüll- oder Einwegmodus mit benutzerdefinierten Schwellenwerten konfiguriert werden. Die Eingangs- ([img=virtual-signal/signal-I]) und Ausgangs- ([img=virtual-signal/signal-O]) Werte werden in Prozent angegeben.
nullius-small-pump-1=Nur halb so groß wie eine normale Pumpe, aber langsamer. Pumpt bis zu 2400/s\n
nullius-small-pump-2=Nur halb so groß wie eine normale Pumpe, aber langsamer. Pumpt bis zu 4800/s\n
