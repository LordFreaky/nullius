nullius-heat-pipe-1=Transportiert bis zu 30 MW Wäremeengerie.\n[font=default-semibold][color=1,0.9,0.75]Heat capacity:[/color][/font]  100kJ pro ºC.\n[font=default-semibold][color=1,0.9,0.75]Maximaltemperatur:[/color][/font]  250C
