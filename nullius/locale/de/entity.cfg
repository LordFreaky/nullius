nullius-night-vision-3=Perfekte Sicht bei Dunkelheit.
nullius-levitation-field=Über Förderbänder gehen, ohne dass man mitgerissen wird.
nullius-shield=Persönliches Schutzkraftfeld.
nullius-leg-augmentation=Erhöht die Bewegungsgeschwindigkeit.  Kumulierbar.
nullius-hangar=Lagerung für Roboter zwischen den Aufgaben.  Platzieren oder ausrüsten.\nDer Modus „Nur Platzieren“ kann über __CONTROL__nullius-prioritize__ festgelegt werden.
nullius-charger=Zusätzliches Aufladen für aktive Roboter.  Platzieren oder ausrüsten.
nullius-relay=Erweitert die Reichweite von Robotern.  Bauen oder ausrüsten.\nDer Modus „Nur Platzieren“ kann mit __CONTROL__nullius-prioritize__ festgelegt werden.
nullius-battery=Energiespeicheranlagen oder Kraftstoff für Fahrzeuge.
nullius-jetpack-1=[font=default-bold][color=#f5cb48]Schubkraft: 1[/color][/font]\nDrücke __CONTROL__jetpack__ zur Aktivierung.\nDamit kannst du über Gebäude und Wasser fliegen. Mit mehreren Jetpacks fliegst du schneller. Beim Fliegen werden Raketentreibstoff oder Methanolkanister aus deinem Inventar verbraucht.
nullius-jetpack-2=[font=default-bold][color=#f5cb48]Schubkraft: 2[/color][/font]\nDrücke __CONTROL__jetpack__ zur Aktivierung.\nDamit kannst du über Gebäude und Wasser fliegen. Mit mehreren Jetpacks fliegst du schneller. Beim Fliegen werden Raketentreibstoff oder Methanolkanister aus deinem Inventar verbraucht.
nullius-jetpack-3=[font=default-bold][color=#f5cb48]Schubkraft: 3[/color][/font]\nDrücke __CONTROL__jetpack__ zur Aktivierung.\nDamit kannst du über Gebäude und Wasser fliegen. Mit mehreren Jetpacks fliegst du schneller. Beim Fliegen werden Raketentreibstoff oder Methanolkanister aus deinem Inventar verbraucht.
nullius-jetpack-4=[font=default-bold][color=#f5cb48]Schubkraft: 4[/color][/font]\nDrücke __CONTROL__jetpack__ zur Aktivierung.\nDamit kannst du über Gebäude und Wasser fliegen. Mit mehreren Jetpacks fliegst du schneller. Beim Fliegen werden Raketentreibstoff oder Methanolkanister aus deinem Inventar verbraucht.
nullius-portable-generator=Verbraucht Kraftstoff, um Android-Geräte mit Strom zu versorgen.
nullius-portable-generator-backup=Verbraucht Kraftstoff, um Android-Geräte mit Strom zu versorgen.  Hat eine geringere Priorität als Akkus.  Kann als Ergänzung zur Solarenergie nützlich sein, wobei der Kraftstoff nur als letzte Möglichkeit genutzt wird.
nullius-portable-reactor=Verbrennt Kernbrennstoff, um Android-Geräte mit Energie zu versorgen.
nullius-refueler=Generatoren und tragbare Reaktoren werden automatisch mit Kraftstoff aus dem Lagerbestand aufgefüllt. Es wird nur Kraftstoff derselben Art nachgeladen, der bereits von diesen Geräten verwendet wird.
nullius-jump-boots=Bietet mehr Bewegungsgeschwindigkeit auf Kosten der Tragkraft.
nullius-deactivated-coprocessor=Dieser Coprozessor wurde abgeschaltet, da die Obergrenze für Coprozessoren der Stufe __1__ überschritten wurde.
nullius-coprocessor-quantum=Ermöglicht die Installation von bis zu zwei Coprozessoren unterschiedlicher Art für jede Ebene.
nullius-coprocessor-speed=Erhöht die Bewegungs- und Handwerksgeschwindigkeit.  Vervielfacht die Geschwindigkeit und den Energieverbrauch anderer Handwerkswerkzeuge.\n[font=default-semibold][color=1,0.9,0.75]Handherstellungsgeschwindigkeitsmultiplikator:[/color][/font]  __1__%\n[font=default-semibold][color=1,0.9,0.75]Handherstellungsgeschwindigkeitspönale:[/color][/font]  __2__%\n[font=default-semibold][color=1,0.9,0.75]Energie pro Bauplansekunde:[/color][/font]  __3__kJ
nullius-coprocessor-efficiency=Optimiert den Grundstromverbrauch von Android-Geräten und den Energieverbrauch von Handwerkswerkzeugen.\n[font=default-semibold][color=1,0.9,0.75]Energieüberschuss:[/color][/font]  __1__kW\n[font=default-semibold][color=1,0.9,0.75]Energie-Rabatt:[/color][/font]  __2__%
nullius-coprocessor-productivity=Erzeugt beim Handwerk mehr Ausbeute aus demselben Material, allerdings auf Kosten der Geschwindigkeit.  Organisiert die Ladung, um den Zusatzstauraum besser zu nutzen.\n[font=default-semibold][color=1,0.9,0.75]Produktivitätsprämie:[/color][/font]  __1__%\n[font=default-semibold][color=1,0.9,0.75]Handherstellungsgeschwindigkeitspönale:[/color][/font]  __2__%\n[font=default-semibold][color=1,0.9,0.75]Energie pro Bauplansekunde:[/color][/font]  __3__kJ\n[font=default-semibold][color=1,0.9,0.75]Kapazität des Frachtmoduls:[/color][/font]  __4__%
nullius-coprocessor-tier-1=Es können bis zu zwei Stufe-1-Coprozessoren unterschiedlicher Typen installiert werden.
nullius-coprocessor-tier-2=Es kann zusätzlich zu Stufe 1 ein Stufe-2-Coprozessor installiert werden.
nullius-coprocessor-tier-3=Es kann ein Stufe-3-Coprozessor sowie Coprozessoren niedrigerer Stufen installiert werden.
