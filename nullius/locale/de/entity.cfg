nullius-grid-battery-3=Effiziente kurzfristige Speicherung elektrischer Energie.
nullius-solar-collector-1=Generiert durchschnittlich 150 kW Wärme (ohne Bonus), Spitzenwert 240 kW in der Tagesmitte.  Die Wärmeerzeugung nimmt bei höheren Temperaturen ab.\n[font=default-semibold][color=1,0.9,0.75]Maximaltemperatur:[/color][/font]  250C
