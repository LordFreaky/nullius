nullius-solar-panel-1=Zyklische erneuerbare Engergiequelle, mittlerer Ertrag 70 kW.  Platzieren oder Ausrüsten.
nullius-solar-panel-2=yklische erneuerbare Engergiequelle, mittlerer Ertrag 140 kW.  Platzieren oder Ausrüsten.
