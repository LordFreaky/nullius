nullius-stirling-build-2=Wandelt Wärme mit einem Wirkungsgrad von 90 % in bis zu 2.5 MW Strom um.\n[font=default-semibold][color=1,0.9,0.75]Optimaler Arbeitsbereich:[/color][/font]  200C bis 500C\n[font=default-semibold][color=1,0.9,0.75]Minimale Arbeitstemperartur:[/color][/font]  100C
