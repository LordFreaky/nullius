[nullius]
menu_nullius=Nullius
title_nullius=Nullius: Ein Factorio Prequel

page_nullius_text_1=In diesem Prequel zu Factorio spielst du einen Androiden, der entsandt wurde, um öde Planeten bewohnbar zu machen und sie mit Leben zu besiedeln. Eonen später werden deine Bemühungen zu einer Galaxie voller Planeten führen, auf denen Ingenieure notlanden können. Dies ist ein Mod, der alle Rezepte und Technologien komplett überarbeitet. Kein Leben bedeutet keine Kohle, kein Öl, kein Holz, keine Beißer und keinen freien Sauerstoff in der Atmosphäre. Da viele Planeten zudem arm an seltenen, schwereren Elementen wie Kupfer oder Uran sind, wird sich deine Technologie auf die reichlich vorhandenen, leichteren Elemente konzentrieren.

page_nullius_text_2=Die grundlegenden natürlichen Ressourcen sind Eisenerz, Sandstein, Bauxit, Kalkstein, Luft, Meerwasser und vulkanisches Gas. Fortgeschrittene Ressourcen wie Kupfer und Uran werden später mit Hilfe der Asteroidenbergbautechnologie verfügbar. Bauxit ist ein Erz für Aluminium, ein nützlicher elektrischer Leiter und Baustoff. Kalkstein ist eine Kalziumquelle, die in Zement, Glas und der Metallurgie Verwendung findet, und enthält zudem Spuren von Schwefel. Sandstein liefert Silizium, das für die Elektronik und die Glasherstellung unverzichtbar ist, sowie Spuren von Titanerz. Luft besteht größtenteils aus Stickstoff und Kohlendioxid (einem wichtigen Ausgangsstoff für Produkte der organischen Chemie wie Kunststoff) und Spuren anderer wichtiger Gase, darunter Edelgase wie Argon und Helium. Meerwasser ist eine Quelle für Wasserstoff, Sauerstoff, Chlor, Natrium und Spuren von Deuterium, Tritium, Lithium und anderen Mineralien. Vulkangas ist eine Quelle für Schwefel, Kohlenmonoxid und Kleinstmengen von Bor.

page_nullius_text_3=Sobald du eine ausreichende industrielle Basis für den Start von Raketen geschaffen hast, besteht dein finales Ziel darin, den Planeten mit Leben zu besiedeln und Kopien von dir selbst auszusenden, um diesen Prozess auf anderen Planeten in der gesamten Galaxie zu wiederholen. Du musst den Sauerstoffgehalt der Atmosphäre erhöhen und ein genetisch vielfältiges Ökosystem mit zahlreichen Pflanzen- und Tierarten anlegen, von denen jede ihre eigenen Überlebensbedürfnisse hat. Du musst den Kontakt zu deinen Vorfahren wiederherstellen, um die gespeicherten Genome dieser Arten zu erlangen und biologisches Material von Grund auf neu zusammenstellen, bis du über einen ausreichenden Zuchtbestand verfügst, der sich auf natürliche Weise vermehren kann. Viele dieser Arten produzieren nützliche Materialien kostengünstiger, als du sie herstellen kannst, daher solltest du vielleicht einige dieser Organismen in deine Fabrikproduktionslinien integrieren.

menu_mods=Mods
title_mods=Mods
page_mods_text_1=Dieser Mod verwendet eigene Ressourcen, Technologien und Rezepte, sodass er nicht gut mit anderen Mods zusammenarbeitet, die über eigene Technologien und Rezepte verfügen, es sei denn, diese wurden speziell für die Verwendung mit Nullius angepasst. Mods, die das Spielerlebnis verbessern, aber keine eigenen Technologien und Rezepte enthalten, funktionieren möglicherweise problemlos. Bestimmte gängige Gameplay-Funktionen von Mods sind in gewisser Form bereits fester Bestandteil von Nullius, darunter Funktionen zum Auffüllen von Wasser, das Stapeln von Gegenständen und unendliche Erzvorkommen. Ausgewählte Mods mit eigenen Technologiebäumen wurden bereits für die Verwendung mit Nullius portiert. Weitere werden voraussichtlich hinzukommen. Diese Kompatibilität kann entweder von Nullius oder von der jeweiligen Mod bereitgestellt werden.

page_mods_text_2=Zu den Mods, die bereits portiert wurden, gehören: Miniloader, Transport Drones, Jetpack, Factorissimo2, LTN - Logistic Train Network, LTN Combinator Modernized, Bobs Adjustable Inserters, Safe Waterfill, Teleporters, Advanced Fluid Handling, Warehousing, Robot Replacer, AAI Signal Transmission, Train Supply Manager (TSM), Induction Charging, Stack Combinator, Text Plates, Resource Spawner Overhaul (RSO), und I,Robot.

menu_research=Forschung
title_research=Forschung
page_research_text_1=Nullius verfügt über 7 Forschungspakete. Die ersten beiden werden sehr früh freigeschaltet, während die nächsten fünf zunehmend fortgeschrittener und exponentiell teurer werden. Somit lässt sich der Technologiebaum in 6 verschiedene Stufen unterteilen.
page_research_text_2=Nullius ersetzt alle Standardtechnologien, daher unterscheiden sich die Bezeichnungen und der Fortschritt erheblich von dem, was du vielleicht gewohnt bist. Fast alles, was Du im Basisspiel tun kannst, ist auch in Nullius möglich, mit Ausnahme einiger weniger Militär- oder Energietechnologien – diese können jedoch in einer anderen Form vorkommen. Nullius versucht, einige unnötige Zwischenprodukte zu eliminieren und nutzt stattdessen Endprodukte als Zwischenprodukte oder stattet Gegenstände mit mehreren Verwendungszwecken aus.

page_research_text_3=Einige Beispiele:  Sprengstoff für Felswände und Sprengstoff sind keine unterschiedlichen Gegenstände. Nullius-Sprengstoff ist ein Zwischenprodukt, mit dem sich auch Felswände sprengen lassen.  Es gibt keine separaten persönlichen Batteriegeräte. Die normalen Batterien dienen als Ausrüstung, Zwischenprodukte und wiederaufladbare Fahrzeugenergiequelle.  Radargeräte werden als Sensorknoten bezeichnet, und der wesentliche Unterschied besteht darin, dass sie einen viel kleineren Radius für das Abtasten entfernter Sektoren haben (was bei Bitern an Bedeutung zunimmt), dafür aber einen größeren Radius für die Fernüberwachung deiner Fabrik in der Kartenansicht ermöglicht. Stattdessen bietet Nullius im Rahmen der Erkundungstechnologie eine andere Methode zum Abtasten sehr entfernter Sektoren.

menu_early=Frühes Spiel
title_early=Frühes Spiel
page_early_header_1=Stufe 1: Forschung in Geologie und Klimatologie
page_early_text_1=Zu Beginn hast du überhaupt keine Rezepte, aber die erste Technologie schaltet geologische Proben frei und erfordert selbst keine Forschungspakete, sondern lediglich Zeit im Labor. Dein Labor befindet sich irgendwo in den Trümmern deines Raumschiffs. Zu Beginn hast du Zugang zu gerade so vielen Gebäuden, wie du brauchst, um weit genug voranzukommen, damit du all diese Gebäude selbst herstellen kannst.
page_early_text_2=Geologie und Klimatologie lassen sich einfach und kostengünstig errichten.  Technologien dieser Stufe sind sehr kostengünstig und sollten zügig erforscht werden. Sie dienen als Einstieg in die Verfahren zur Herstellung wichtiger Materialien für die nächste Forschungsstufe.
page_early_header_2=Stufe 2: Forschung im Bereich Maschinenbau
page_early_text_3=Maschinenbau ist nicht ganz so einfach zu realisieren, doch Technologien dieser Stufe erfordern immer noch nur eine geringe Anzahl an Forschungspaketen. Mit diesen Technologien kannst du eigene Kopien der meisten Gebäude bauen, mit denen du das Spiel beginnst, und so deine Basis unbegrenzt erweitern. Am Ende dieser Stufe wirst du in der Lage sein, alle deine Abfallnebenprodukte zu beseitigen, was eine nachhaltige Automatisierung ermöglicht.
page_early_text_4=Da eine ordnungsgemäße Ausweitung der Produktion ohne diese grundlegenden mechanischen Technologien überhaupt nicht möglich ist, bleiben die meisten Technologien dieser Stufe und der darunterliegenden Stufen von der Einstellung des Technologiekostenmultiplikators unberührt.

menu_mid=Spielmitte
title_mid=Spielmitte
page_mid_header_1=Stufe 3, Forschung im Bereich Elektrotechnik
page_mid_text_1=Nun, da du deine eigenen Labore und eine größere Fabrik bauen kannst, werden Forschungen allmählich teurer. Die Elektronik ermöglicht ausgefeiltere Steuerungs-, Automatisierungs- und Anpassungsfunktionen, darunter erstmals Roboter, Module, Zugsignale, lange Greifarme und Kombinatoren. Dadurch werden die Stufe-2-Versionen der meisten grundlegenden Produktionsgebäude sowie einige neue Gebäudetypen freigeschaltet.
page_mid_header_2=Stufe 4, Chemieforschung
page_mid_text_2=Chemie eröffnet neue Verwendungsmöglichkeiten für vorhandene Ressourcen und viele neue Materialien und ermöglicht so die Herstellung nützlicher Werkzeuge wie Batterien und Sprengstoffe. Sie verfügt zudem über die Mittel für eine echte Massenproduktion. Zwischenprodukte können zur Steigerung des Transportdurchsatzes in Kartons verpackt werden und neue Rezepturen ermöglichen die direkte Herstellung von verpackten Materialien.  Ebenso können Gase zur Steigerung des Durchsatzes und für eine effizientere Chemie komprimiert werden.

menu_late=Spätphase
title_late=Spätphase
page_late_header_1=Stufe 5, Physikforschung
page_late_text_1=Die Forschung ist wesentlich aufwendiger durchzuführen und erfordert fast zwangsläufig den Einsatz von Bots zur Automatisierung, da man jedoch viele Forschungsergebnisse gleichzeitig erzielt, sind die Ressourcenkosten mit denen früherer Stufen vergleichbar. Diese Stufe ermöglicht es dir, die dritte und letzte Stufe der meisten grundlegenden Bauwerke zu errichten. Sie eröffnet neue Funktionen wie das großflächige Terraforming deiner Umgebung mithilfe von Drohnen sowie die Raketentechnik, die für den Fortschritt bis zum Finale in der nächsten Stufe erforderlich ist.
page_late_header_2=Stufe 6, Himmelskunde
page_late_text_2=Das ist das Finale. Zu Beginn dieser Stufe, nachdem du deine erste Rakete gestartet hast, erhältst du ein Missionspanel mit einer Übersicht über deine Ziele. Diese Aufgaben verschwinden, sobald sie zu 100 % abgeschlossen sind, und du gewinnst, sobald alle erledigt sind. Neben der Forschung kannst du deine Raketen auch für den Asteroidenabbau einsetzen, wodurch du Förderaußenposten mit erneuerbaren Mineralien errichten kannst.  Viele der Technologien dieser Stufe sind unbegrenzt, auch wenn ihre Forschungskosten aufgrund ihres exponentiellen Wachstums irgendwann unerschwinglich werden. Diese unbegrenzten Technologien sind ein guter Anreiz, die Produktion auch nach Erreichen der grundlegenden Terraforming-Ziele im Megabasis-Maßstab fortzusetzen.

menu_fluids=Flüssigkeiten
title_fluids=Flüssigkeiten
page_fluids_text_1=Viele der Technologien auf dieser Stufe sind unbegrenzt verfügbar, doch ihre Chemie und der Umgang mit Flüssigkeiten sind entscheidende Bestandteile des Nullius-Produktionssystems, weshalb es wichtig ist, zu verstehen, wie man mit Flüssigkeiten umgeht. Es gibt bestimmte Bereiche, in denen sich Nullius vom Standard-Flüssigkeitsmanagement unterscheidet, die man beachten sollte.

page_fluids_header_1=Druck (veraltete Mechanik)
page_fluids_text_2=Nullius hatte das Konzept einer „Druck“-Bewertung für Rohre und Tanks eingeführt. Diese wurde in Version 2.0 aus der Logik des Spiels entfernt. Mit dem neuen, vereinfachten Flüssigkeitssystem erhöht eine Aufrüstung der Rohrstufen nun die maximale Rohrleitungslänge. Außerdem verbrauchen Pumpen deutlich mehr Strom als zuvor, sodass du dazu angeregt wirst, deine Rohre aufzurüsten. Beachte, dass die maximale Rohrleitungslänge von Tanks immer etwas geringer ist als die entsprechende Rohrstufe. Dies soll dazu anregen, Tanks mithilfe von Pumpen zu befüllen und zu entleeren. 
page_fluids_header_2=Abfallnebenprodukte
page_fluids_text_5=Viele chemische Prozesse in Nullius führen zu zwei oder mehr Produkten.  In solchen Fällen entsteht meist ein Abfallnebenprodukt, da es unwahrscheinlich ist, dass alle Produkte genau in dem Verhältnis verwendet werden, in dem sie anfallen.  Die Entsorgung unerwünschter Abfallflüssigkeiten ist für eine nachhaltige Automatisierung unerlässlich.
page_fluids_text_6=Bewege den Mauszeiger über das Flüssigkeitssymbol, um den Tooltip zu lesen. Flüssigkeiten können Gase oder Flüssigkeiten sein. Die meisten Gase können über einen Kamin abgeleitet werden, und die meisten Flüssigkeiten können über einen Abfluss abgeleitet werden. Einige sind jedoch als nicht entsorgbar gekennzeichnet und können nicht einfach abgeleitet werden. Alle Nebenprodukte können auf irgendeine Weise vernichtet werden, doch sind dafür möglicherweise weitere Schritte erforderlich. Salzsäure muss beispielsweise zunächst mit einer Laugenlösung neutralisiert werden. Benzol muss zu entsorgbaren Gasen verbrannt werden. Manche Feststoffe, wie beispielsweise Natriumhydroxid oder Kies, können zur Entsorgung in flüssige Form umgewandelt werden. Die meisten wichtigen Technologien zur Abfallentsorgung stehen erst am Ende der Entwicklung der Maschinenbautechnologien zur Verfügung. Zu Beginn des Spiels musst du möglicherweise einige Behälter bauen oder Tanks manuell leeren.
page_fluids_text_7=Ventile sind für die Steuerung komplexer Netzwerke aus Produkten und Nebenprodukten unverzichtbar. In 2.0 Nullius wurden Ventile als eigenständige Komponenten größtenteils entfernt, stattdessen können die Pumpen nun zwischen verschiedenen Betriebsmodi umgeschaltet werden: Überdruckventile dienen dazu, überschüssiges Material abzulassen, wenn sich ein Tank füllt und die Gefahr einer Produktionsverzögerung besteht, ohne dass Material verschwendet wird, solange der Tank nicht voll ist.  Mit Hilfsventilen kann Flüssigkeit nur dann an einen sekundären Ausgang geleitet werden, wenn genügend davon vorhanden ist, um zunächst den primären Verbraucher zu versorgen. Mit Nachfüllventilen kann ein Tank nur dann aufgefüllt werden, wenn er fast leer ist, wobei dennoch etwas Platz bleibt, damit die Flüssigkeit auch als Nebenprodukt gewonnen werden kann, ohne verloren zu gehen.
page_fluids_text_8=Man sollte bedenken, dass Schornstein 1 und Auslass 1 ineffizient sind und ein Rohr nicht vollständig entleeren. Die Quelle muss sich erst etwas füllen, um ihren Widerstand zu überwinden, bevor sie mit dem Abfluss beginnen. Pumpen können nützlich sein, um Flüssigkeiten in Bewegung zu halten.

menu_energy=Energie
title_energy=Energie
page_energy_text_1=Da es auf Nullius kein Leben gibt, gibt es weder Kohle noch Holz oder Öl, und in der Atmosphäre ist ohnehin kein Sauerstoff vorhanden, um diese Brennstoffe zu verbrennen. Dies macht den Einsatz erneuerbarer Energiequellen erforderlich.
page_energy_text_2=Windkraft ist die technisch einfachste Option, die dir zur Verfügung steht, und zu Beginn des Spiels ist sie deine einzige echte Wahl. Später im Maschinenbau erhältst du Zugang zur Solarthermie, die zwar teurer ist, aber die Wärme tagsüber gespeichert wird und nachts oder bei schwachem Wind genutzt werden kann. Ab der Elektrotechnik-Phase stehen dir verschiedene Optionen mit unterschiedlichen Vor- und Nachteilen zur Verfügung. Windkraft erfordert viel Land und ist unvorhersehbar.  Solarzellen können teuer sein und liefern nachts keinen Strom. Geothermie liefert konstanten Strom, kann jedoch nur an vulkanischen Fumarolen genutzt werden. Kernkraft liefert konstanten Strom und kann überall errichtet werden, verbraucht dafür jedoch gewisse Ressourcen.
page_energy_text_3=Windkraftanlagen müssen in einem Abstand von genau 32 Kacheln zueinander aufgestellt werden, sodass sie viel Platz beanspruchen. Die Verwendung von rasterausgerichteten Bauplänen oder der F5-Rasteransicht kann dir dabei helfen, einen ordentlichen Abstand zu planen. Das Aufstellen wird einfacher, sobald du den Pylon 1 erforschst, da dieser genau die 32 Kacheln abdeckt, die du für die Aufstellung einer Anlage benötigst. Hab keine Angst davor, einen großen Windpark zu bauen, denn es gibt keine Angreifer, sodass du dieses Gebiet nicht verteidigen musst. Die Bots, mit denen du startest, könnten dir beim Platzieren der Baupläne helfen.

page_energy_header_1=Energiespeicher
page_energy_text_4=Da Wind- und Solarenergie schwankende Strommengen liefern, sind Energiespeicher erforderlich. Batteriespeicher sind erst dann verfügbar, wenn die chemisch-technische Technologie so weit fortgeschritten ist, da zu Beginn nur eine begrenzte Anzahl von Elementen für ihre Herstellung zur Verfügung steht. Bis dahin können mit Hilfe von Elektrolyseuren oder Kompressoren eigene Systeme errichtet werden, die als Speicher dienen. Der Spitzenlast-Elektrolyseur arbeitet ausschließlich mit überschüssigem Strom, so wie ein Akku Energie speichert. Der dabei entstehende Wasserstoff und Sauerstoff kann in Tanks gespeichert werden, wenn Wind- oder Solaranlagen hinreichend Energie produzieren. Diese Reserve kann später zur Stromerzeugung verbrannt werden. Die Turbine verbraucht nur dann Dampf, wenn Wind- und Solaranlagen nicht genug Strom generieren.
page_energy_text_5=Es lohnt sich, den Einsatz dieser Spitzenlast-Elektrolyseure auch in der regulären Produktion in Betracht zu ziehen, anstelle der herkömmlichen Prioritäts-Elektrolyseure. Spitzenlast-Elektrolyseure verfügen über einen hohen maximalen Durchsatz, sodass sie Tanks in Zeiten mit reichlich Energie auffüllen können. Die Elektrolyse ist einer der größten Energieverbraucher. Flexibel eingesetzt, können dadurch der Mindestenergiebedarf und die Anzahl Energiespeichern reduziert werden. Der Nachteil ist, dass bei anhaltendem Strommangel keine Spannungsabfälle auftreten, sondern stattdessen der Wasserstoffvorrat zur Neige geht.
page_energy_text_6=Die Dampftemperatur in Nullius ist rein kosmetischer Natur. Reaktionen bei höheren Temperaturen erzeugen im Verhältnis zum Einsatz eine größere Dampfmenge, und entscheidend ist die Anzahl der Einheiten. Jede Dampfeinheit verfügt über eine bestimmte Energiemenge, die im Tooltip angezeigt wird, sodass sich leicht berechnen lässt, wie viel Energie in einem Tank gespeichert ist.  Turbinen können sowohl mit Dampf als auch mit anderen komprimierten Gasen betrieben werden, die eine bestimmte Menge an Energie pro Einheit aufweisen. Komprimierter Stickstoff ist das am häufigsten verwendete Energiespeichermedium, da bei der Luftzerlegung ständig überschüssiger Stickstoff als Nebenprodukt anfällt.

