nullius-complete-objective=Missionziel: __1__ erreicht!
nullius-overall=Fortschritte bei der Erfüllung aller Siegbedingungen.
nullius-vented=Wie viel Sauerstoff sind in der Luft befindet.
nullius-algae=Gewässer durch Drohnen mit Algen bepflanzen für die Algenzucht.
nullius-grass=Küstengebiete mit Hilfe von Gartenbaudrohnen begrünen.
nullius-tree=Pflanze Bäume in der Nähe von Würmern und fern von Fumarolen, wobei Drohnen für die Baumpflege notwendig sind.
nullius-worm=Lassen Sie die Würmer mithilfe von Insekten-Drohnen in der Nähe von Gras oder Bäumen frei.\nBevorzugt einen Sauerstoffgehalt von über 30%.
nullius-fish=Setzen Sie die Fische in der Nähe von Algen aus, wobei Sie Aquakultur-Drohnen einsetzen.\nBevorzugt einen Sauerstoffgehalt von über 60%.
nullius-arthropod=Lassen Sie Arthropoden an Land in der Nähe von Bäumen und Gewässern frei.\nBevorzugt einen Sauerstoffgehalt von über 80 %.
nullius-oxygen=Erhöhen Sie den Sauerstoffgehalt in der Atmosphäre. Pflanzen, die Sie in der freien Natur aussäen, werden dies im Laufe der Zeit allmählich bewirken. Auch das Ablassen von Sauerstoff trägt dazu bei. Das Ablassen von Wasserstoff, Methan oder anderen reduzierenden Stoffen wirkt dem Sauerstoffgehalt teilweise entgegen.
nullius-probe=Starte 10 Raketen mit Sonden.
nullius-terraform=Gestalte exotische, fremdartige Landschaften wie schwarze, violette oder vulkanische Gebiete mithilfe von Terraforming- oder Baggerdrohnen neu.
nullius-copper=Lande 20 Kupfer-Asteroiden-Leitdrohnen.
nullius-uranium=Lande 12 Uran-Asteroiden-Leitdrohnen.
nullius-coal=Legen Sie mithilfe von Sequestrierungsdrohnen Ablagerungen im Gesamtvolumen von 3 Millionen Tonnen Kohle an.
nullius-petroleum=Errichten Sie mithilfe von Sequestrierungsdrohnen Lagerstätten mit einem Gesamtvolumen von 12 Millionen Barrel Erdöl.
nullius-atmospheric-modification=Erfülle das Sauerstoff-Missionsziel.
nullius-objective=Erreiche __2__% Fortschritt des __1__ Missionsziels.
nullius-switch-bodies=Wechsle die Gestalt __1__ mal.  Benutze __CONTROL__nullius-upload-mind__ die Kontrolle über einen unbesetzten Gestalt zu übernehmen oder __CONTROL__nullius-next-body__ um zum vorhergehenden zurückzukehren.
