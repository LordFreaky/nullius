nullius-intro=Du bist ein von-Neumann-Androide. Nach Hunderten von Jahren relativistischer Reise ist deine Sonde am Zielplaneten angekommen, und du wurdest mit einer kleinen Ladung lebenswichtiger Ausrüstung aktiviert. Dieser leblose Planet ist relativ arm an schweren Elementen und verfügt über keine atembare Atmosphäre.  Trotz dieser geringfügigen Mängel gilt er insgesamt als hervorragender Kandidat für die Terraformung.  Dein Auftrag besteht darin, die für die Terraformung dieses Planeten erforderlichen industriellen Kapazitäten aufzubauen, ihn mit Leben zu besiedeln und dann eine Welle von Nachfolgern zu erschaffen, die ihren Weg zu weiteren Planeten finden.

nullius-mission=Die erste Phase deiner Mission ist die Schaffung eines großen und hochmodernen Industrieaußenposten auf einem abgelegenen, kargen Planeten ezu errichten. In der nächsten Phase gilt es, diese Kapazitäten zu nutzen, um den Planeten zu terraformen. Dir steht dann ein Übersichtsfenster zur Verfügung, in dem der Fortschritt bei jedem verbleibenden Ziel angezeigt wird, sowie eine Schaltfläche zur Verwaltung dieses Fensters.  Deine Mission gilt als erfolgreich, sobald alle Aufgaben erfüllt sind.\n\nDu musst 3 Pflanzen- und 3 Tierarten ansiedeln. Die Genome können heruntergeladen werden, sobald du Satellitenkontakt zum interstellaren Netzwerk hergestellt hast. Setze sie mithilfe von Drohnen in der freien Natur aus, wobei die optimalen Lebensbedingungen für jede Art anzeigen werden.  Tiere benötigen Sauerstoff.\n\nEin weiteres Ziel ist es, den globalen Sauerstoffgehalt zu erhöhen. Pflanzen, die in die freie Natur entlassen werden, sorgen im Laufe der Zeit für einen allmählichen Anstieg des Sauerstoffgehalts. Der von Ihnen freigesetzte Sauerstoff (oder komprimierte Sauerstoff) trägt ebenfalls zur Anreicherung der Atmosphäre bei. Durch die Freisetzung von Wasserstoff oder anderen reduzierenden Gasen wird hingegen ein Teil des Sauerstoffs wieder gebunden.  Außerdem muss der Kohlenstoffdioxidgehalt in der Atmosphäre gesenkt wrden, indem er in Form von Kohle und Erdöl gebunden wird.\n\nAuf diesem Planeten herrscht ein Mangel an Schwermetallen, der durch den Abbau von Asteroiden behoben werden kann. Zwei weitere Ziele bestehen darin, neue Lagerstätten seltener Mineralien zu erschließen.  Außerdem gilt es fremde Landschaft mithilfe von Terraforming-Drohnen umzugestalten, um unwirtliches Gelände durch Boden zu ersetzen, der für neues Leben besser geeignet ist.\n\nSchließlich musst du die Terraforming-Welle in der ganzen Galaxie verbreiten, indem du Kopien von dir selbst erschaffst und diese in Raumschiffen zu anderen Planeten schickst, die potenziell für Terraforming geeignet sind.

[mod-name]
nullius=Nullius

[mod-description]
nullius=In diesem Factorio-Prequel schlüpfst du in die Rolle eines Androiden, der Planeten terraformt und mit Leben besiedelt. Alle Rezepte und Technologien werden ersetzt. Kein Leben bedeutet kein Kohle, Öl, Holz, Beißer oder freien Sauerstoff, sodass vielfältige erneuerbare Energiequellen erforderlich sind. Aus Gründen der Zuverlässigkeit konzentrierst du dich auf reichlich vorhandene Elemente aus der Luft, dem Meer oder gängige Mineralien wie Eisenerz, Bauxit, Sandstein und Kalzit. Fortgeschrittene Technologien ermöglichen den Abbau seltenerer Elemente auf Asteroiden.  Besuche das Mod-Portal für eine ausführlichere Beschreibung und eine Liste kompatibler Modifikationen.

