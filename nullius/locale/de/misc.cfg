[alignment]
nullius-align-first-intro=Du bist ein von-Neumann-Androide. Deine Sonde ist auf einem kargen Planeten gelandet, mit dem Auftrag, ihn zu erraformen, mit Leben zu besiedeln und eine Reihe von Nachfolgern zu erschaffen, die zu weiteren Planeten aufbrechen. Du hast Anzeichen dafür entdeckt, dass sich andere Sonden diesem Planeten nähern könnten, aber du bist der Erste, der angekommen ist.  Nutze diesen Vorsprung, um dich auf potenziell feindliche Einmischung vorzubereiten, bis du feststellen kannst, ob sie nach kompatiblen Richtlinien handeln.  Wenn ja, arbeitet zusammen, um eure Ziele schneller zu erreichen. Andernfalls musst du sie so umprogrammieren, sodass sie deine Ziele teilen oder beeile dich um sie auszustechen. Mach dich auf eine harte Landung gefasst, wenn du in die Atmosphäre eintrittst.

nullius-align-intro=Du bist ein von-Neumann-Androide. Deine Sonde ist auf einem kargen Planeten gelandet, mit dem Auftrag, ihn zu erraformen, mit Leben zu besiedeln und eine Reihe von Nachfolgern zu erschaffen, die zu weiteren Planeten aufbrechen. Du hast Anzeichen dafür entdeckt, dass sich andere Sonden diesem Planeten nähern könnten, aber du bist der Erste, der angekommen ist.  Nutze diesen Vorsprung, um dich auf potenziell feindliche Einmischung vorzubereiten, bis du feststellen kannst, ob sie nach kompatiblen Richtlinien handeln.  Wenn ja, arbeitet zusammen, um eure Ziele schneller zu erreichen. Andernfalls musst du sie so umprogrammieren, sodass sie deine Ziele teilen oder beeile dich um sie auszustechen. Mach dich auf eine harte Landung gefasst, wenn du in die Atmosphäre eintrittst.

align-concordance=__1__ hat eine vollständige planetarische Einigkeit erreicht. Dieses Sternensystem wurde im galaktischen Netzwerk dauerhaft beansprucht. Alle rivalisierenden Fraktionen, die in diesem System angekommen sind oder noch ankommen werden, wurden in einen einheitlichen Terraforming-Plan eingebunden.
align-transponder-self=__1__ hat den Standort von __2__ geteilt: (__3__, __4__).
align-transponder-other=__1__ hat seinen aktuellen Standort geteilt: (__2__, __3__).
align-no-identification=Du kannst keine Ausrichtungskarte verwenden, die nicht eigenständig von deiner aktuellen Fraktion entwickelt wurde.
align-protected-transmitter=Zielfraktion, die durch einen Konkordanzsender geschützt ist.
align-protected-identity=Der Spieler wird durch seine ID geschützt.
align-guarded-identity=Das Zielgebäude wird von einem Fraktionsmitglied mit ID bewacht.

